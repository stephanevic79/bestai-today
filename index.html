<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEST AI TODAY — Comparateur d'IA en temps réel</title>
    <meta name="description" content="Découvrez en temps réel les meilleurs modèles d'IA — GPT-4, Claude, Gemini — classés par score Elo sur un podium interactif. Gratuit, payant, code : filtrez et partagez.">
    <meta property="og:title" content="Best AI Today — Real-time AI Leaderboard">
    <meta property="og:description" content="Découvrez en temps réel les meilleurs modèles d'IA classés par score Elo. Filtrez par compétence et partagez le podium.">
    <meta property="og:url" content="https://www.bestai-today.com">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://www.bestai-today.com/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://www.bestai-today.com">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #040c18;
            --cyan: #00d4ff;
            --text-light: #cce8f0;
            --paid: #ff66b2;
            --free: #00e676;       /* anciennement --unlimited */
            --orange: #ff8c00;
            --card-bg: rgba(6, 18, 36, 0.75);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #040c18;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem 1rem 5rem;
            position: relative;
            overflow-x: hidden;
        }
        body::before { /* ... (inchangé) ... */ }
        body::after { /* ... (inchangé) ... */ }
        .starfield { /* ... (inchangé) ... */ }
        .container { /* ... (inchangé) ... */ }
        .header { /* ... (inchangé) ... */ }
        .header h1 { /* ... (inchangé) ... */ }
        .header .sub { /* ... (inchangé) ... */ }

        /* ---- Bandeau méta (inchangé) ---- */
        .meta-info { /* ... */ }
        .meta-details { /* ... */ }
        .meta-score-explanation { /* ... */ }

        /* ---- Bandeau API (inchangé) ---- */
        .api-badge-info { /* ... */ }

        /* ---- Filtres (inchangé structurellement) ---- */
        .filters { /* ... */ }
        .filter-column { /* ... */ }
        .filter-group { /* ... */ }
        .filter-btn { /* ... */ }
        .filter-btn.active { /* ... */ }
        .filter-description { /* ... */ }

        .podium-container { /* ... */ }
        .podium-card { /* ... */ }
        .podium-card.no-anim { /* ... */ }
        @keyframes fadeInUp { /* ... */ }
        .podium-card:hover { /* ... */ }
        .rank-number { /* ... */ }

        /* Badges */
        .badge {
            font-size: 0.65rem;
            font-weight: 800;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-top: 0.2rem;
            margin-bottom: 0.5rem;
            white-space: nowrap;          /* empêche le texte de se casser */
        }
        .badge.paid { background: var(--paid); color: #040c18; }
        .badge.free { background: var(--free); color: #040c18; }   /* anciennement .badge.unlimited */
        .badge.api-free { background: #4ade80; color: #040c18; }   /* vert adouci */
        .badge.api-freemium { background: #60a5fa; color: #040c18; } /* bleu */

        .name-wrapper { /* ... */ }
        .name { /* ... */ }
        .podium-card .vendor { /* ... */ }
        .podium-card .score-val { /* ... */ }
        .gauge { /* ... */ }
        .gauge-fill { /* ... */ }
        .status-message { /* ... */ }
        @keyframes pulse { /* ... */ }
        .model-list { /* ... */ }

        /* Bloc modèle */
        .model-item { /* ... */ }
        .model-item:hover { /* ... */ }
        .model-row-top { /* ... */ }
        .model-rank { /* ... */ }
        .model-name { /* ... */ }
        .model-name-text { /* ... */ }
        .model-vendor { /* ... */ }
        .model-bottom { /* ... */ }
        .gauge-list { /* ... */ }
        .gauge-list-fill { /* ... */ }
        .gauge-list-fill.gauge-cyan { /* ... */ }
        .gauge-list-fill.gauge-orange { /* ... */ }
        .score-block { /* ... */ }
        .score-label { /* ... */ }
        .score-value { /* ... */ }

        /* Expansion */
        .expand-toggle { /* ... */ }
        .expand-toggle:hover { /* ... */ }
        .text-toggle-wrapper { /* ... */ }
        .model-item.expanded .model-name { /* ... */ }
        .model-item.expanded .text-toggle-wrapper { /* ... */ }
        .model-item.expanded .model-name-text { /* ... */ }
        .model-item.expanded .expand-toggle { /* ... */ }

        .share-container { /* ... */ }
        .share-container .filter-btn { /* ... */ }
        .ad-slot { /* ... */ }
        .footer { /* ... */ }
        .footer a { /* ... */ }
        .sticky-footer { /* ... */ }
        .sticky-footer a { /* ... */ }
        @media (max-width: 650px) { /* ... (inchangé) ... */ }
        .toast-container { /* ... */ }
        .toast { /* ... */ }
        .toast.success { /* ... */ }
        .toast.error { /* ... */ }
        .toast.info { /* ... */ }
        @keyframes toastIn { /* ... */ }
        @keyframes toastOut { /* ... */ }
    </style>
</head>
<body>
    <div class="starfield" id="starfield"></div>
    <div class="container">
        <header class="header">
            <h1>BEST AI TODAY</h1>
            <div class="sub" id="subtitle"></div>
        </header>

        <!-- Bandeau méta (masqué en maintenance) -->
        <div id="metaInfo" class="meta-info" style="display: none;">
            <div class="meta-details">
                <span class="meta-item">📅 <span id="rankingDateText"></span></span>
                <span class="separator">•</span>
                <span class="meta-item">✅ <span id="verifiedText"></span></span>
                <span class="separator">•</span>
                <span class="meta-item" id="modelsCountText"></span>
            </div>
            <div class="meta-score-explanation">
                <span id="scorePart1"></span><span class="meta-score-sep"> — </span><span id="scorePart2"></span>
            </div>
        </div>

        <!-- Bandeau API (masqué en maintenance) -->
        <div class="api-badge-info" id="apiBadgeInfo"></div>

        <!-- Filtres (masqués en maintenance) -->
        <div class="filters" id="filtersContainer">
            <div class="filter-column">
                <div class="filter-group" id="typeFilter">
                    <button class="filter-btn active" data-type="all" id="filterAll"></button>
                    <button class="filter-btn" data-type="free" id="filterFree"></button>
                    <button class="filter-btn" data-type="paid" id="filterPaid"></button>
                </div>
                <div class="filter-description" id="typeDesc"></div>
            </div>
            <div class="filter-column">
                <div class="filter-group" id="categoryFilter">
                    <button class="filter-btn active" data-cat="general" id="filterGeneral"></button>
                    <button class="filter-btn" data-cat="code" id="filterCode"></button>
                </div>
                <div class="filter-description" id="categoryDesc"></div>
            </div>
        </div>

        <div id="podium" class="podium-container category-general"></div>
        <div id="emptyMsg" class="status-message"></div>
        <div id="maintenanceMsg" class="status-message"></div>
        <div class="share-container" id="shareContainer">
            <button id="snapshotBtn" class="filter-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                </svg>
                <span id="shareText"></span>
            </button>
        </div>
        <div id="modelList" class="model-list"></div>
        <div class="ad-slot" aria-hidden="true"></div>
        <footer class="footer">
            <div id="footerSource"></div>
            <div id="footerAffiliate"></div>
            <div id="footerDisclaimer"></div>
            <div id="footerLegal"></div>
        </footer>
    </div>
    <div id="stickyFooter" class="sticky-footer">
        <a href="https://www.buymeacoffee.com/bestaitoday" target="_blank" rel="noopener" id="stickySupportLink"></a>
        <span id="stickyCopyright"></span>
    </div>
    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

    <script>
        (function() {
            const i18n = {
                fr: {
                    slogan: 'Quel modèle IA domine en ce moment ?',
                    all: 'Tous', free: 'Gratuit', paid: 'Payant',
                    general: 'Général', code: 'Code',
                    share: 'Partager',
                    maintenance: '🛠️ En cours de maintenance',
                    empty: 'Aucun modèle trouvé pour cette sélection.',
                    snapshotCopied: '✅ Image copiée dans le presse-papiers !',
                    snapshotError: 'Impossible de partager automatiquement.',
                    html2canvasMissing: 'html2canvas non chargé.',
                    snapshotDownloaded: 'Image téléchargée.',
                    rankingDateLabel: 'Classement du',
                    verifiedLabel: 'Vérifié il y a',
                    lessThanMinute: "moins d'une minute",
                    modelsCount: '{filtered} / {total} modèles affichés',
                    scorePart1: 'Score basé sur les duels Chatbot Arena',
                    scorePart2: '100% = meilleur modèle du moment',
                    typeAllDesc: "Tous les modèles, sans distinction d'accès.",
                    typeFreeDesc: 'Accessibles sans abonnement via leur interface web.',
                    typePaidDesc: 'Nécessitent un abonnement ou des crédits.',
                    categoryGeneralDesc: 'Performances en conversation générale.',
                    categoryCodeDesc: 'Performances en programmation et raisonnement technique.',
                    apiFree: 'API gratuite',
                    apiFreemium: 'API freemium',
                    apiBadgeInfoText: '💡 Le badge <strong>« API gratuite »</strong> indique les modèles utilisables gratuitement dans vos projets de développement.',
                    support: '☕ Soutenir le projet',
                    affiliateNotice: "Certains liens sont des liens d'affiliation.",
                    source: 'Classement basé sur les données Chatbot Arena.',
                    disclaimer: 'Ce classement ne constitue pas un avis éditorial.',
                    legal: 'Mentions légales',
                    copyright: '© 2026 Best AI Today'
                },
                en: {
                    slogan: 'Which AI model leads right now?',
                    all: 'All', free: 'Free', paid: 'Paid',
                    general: 'General', code: 'Code',
                    share: 'Share',
                    maintenance: '🛠️ Under maintenance',
                    empty: 'No models found for this selection.',
                    snapshotCopied: '✅ Image copied to clipboard!',
                    snapshotError: 'Could not share automatically.',
                    html2canvasMissing: 'html2canvas not loaded.',
                    snapshotDownloaded: 'Image downloaded.',
                    rankingDateLabel: 'Ranking from',
                    verifiedLabel: 'Checked',
                    lessThanMinute: 'less than a minute',
                    modelsCount: '{filtered} / {total} models shown',
                    scorePart1: 'Score based on Chatbot Arena battles',
                    scorePart2: '100% = best model right now',
                    typeAllDesc: 'All models, free and paid.',
                    typeFreeDesc: 'Accessible without a subscription via their web interface.',
                    typePaidDesc: 'Requires a subscription or credits.',
                    categoryGeneralDesc: 'Performance in general conversation.',
                    categoryCodeDesc: 'Performance in programming and technical reasoning.',
                    apiFree: 'Free API',
                    apiFreemium: 'Freemium API',
                    apiBadgeInfoText: '💡 The <strong>"Free API"</strong> badge indicates models you can use for free in your development projects.',
                    support: '☕ Support the project',
                    affiliateNotice: 'Some links are affiliate links.',
                    source: 'Rankings based on Chatbot Arena data.',
                    disclaimer: 'This ranking is not editorial advice.',
                    legal: 'Legal notice',
                    copyright: '© 2026 Best AI Today'
                }
            };

            const lang = navigator.language.startsWith('fr') ? 'fr' : 'en';
            document.documentElement.lang = lang;
            const t = i18n[lang];

            document.getElementById('subtitle').textContent = t.slogan;
            document.getElementById('filterAll').textContent = t.all;
            document.getElementById('filterFree').textContent = t.free;
            document.getElementById('filterPaid').textContent = t.paid;
            document.getElementById('filterGeneral').textContent = t.general;
            document.getElementById('filterCode').textContent = t.code;
            document.getElementById('shareText').textContent = t.share;
            document.getElementById('maintenanceMsg').textContent = t.maintenance;
            document.getElementById('emptyMsg').textContent = t.empty;
            document.getElementById('scorePart1').textContent = t.scorePart1;
            document.getElementById('scorePart2').textContent = t.scorePart2;
            document.getElementById('apiBadgeInfo').innerHTML = t.apiBadgeInfoText;
            document.getElementById('footerSource').textContent = t.source;
            document.getElementById('footerAffiliate').textContent = t.affiliateNotice;
            document.getElementById('footerDisclaimer').textContent = t.disclaimer;
            document.getElementById('footerLegal').innerHTML = `<a href="legal.html">${t.legal}</a>`;
            document.getElementById('stickySupportLink').textContent = t.support;
            document.getElementById('stickyCopyright').textContent = t.copyright;

            let currentType = 'all';
            let currentCategory = 'general';
            let updateInfoInterval = null;

            const podiumEl = document.getElementById('podium');
            const listEl = document.getElementById('modelList');
            const emptyMsgEl = document.getElementById('emptyMsg');
            const metaInfoEl = document.getElementById('metaInfo');
            const rankingDateTextEl = document.getElementById('rankingDateText');
            const verifiedTextEl = document.getElementById('verifiedText');
            const modelsCountTextEl = document.getElementById('modelsCountText');
            const typeBtns = document.querySelectorAll('#typeFilter .filter-btn');
            const catBtns = document.querySelectorAll('#categoryFilter .filter-btn');
            const snapshotBtn = document.getElementById('snapshotBtn');
            const typeDescEl = document.getElementById('typeDesc');
            const categoryDescEl = document.getElementById('categoryDesc');
            const filtersContainer = document.getElementById('filtersContainer');
            const apiBadgeInfo = document.getElementById('apiBadgeInfo');
            const shareContainer = document.getElementById('shareContainer');
            const maintenanceMsgEl = document.getElementById('maintenanceMsg');

            const typeDescriptions = { all: t.typeAllDesc, free: t.typeFreeDesc, paid: t.typePaidDesc };
            const categoryDescriptions = { general: t.categoryGeneralDesc, code: t.categoryCodeDesc };

            function updateTypeDesc() {
                const active = document.querySelector('#typeFilter .filter-btn.active');
                typeDescEl.textContent = typeDescriptions[active ? active.dataset.type : 'all'];
                setDescriptionWidths();
            }
            function updateCategoryDesc() {
                const active = document.querySelector('#categoryFilter .filter-btn.active');
                categoryDescEl.textContent = categoryDescriptions[active ? active.dataset.cat : 'general'];
                setDescriptionWidths();
            }
            function setDescriptionWidths() {
                typeDescEl.style.maxWidth = 'none';
                categoryDescEl.style.maxWidth = 'none';
                requestAnimationFrame(() => {
                    typeDescEl.style.maxWidth = (document.getElementById('typeFilter').offsetWidth - 4) + 'px';
                    categoryDescEl.style.maxWidth = (document.getElementById('categoryFilter').offsetWidth - 4) + 'px';
                });
            }
            window.addEventListener('load', setDescriptionWidths);
            window.addEventListener('resize', setDescriptionWidths);
            updateTypeDesc();
            updateCategoryDesc();

            function showToast(message, type = 'info') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                const icons = { success: '✅ ', error: '❌ ', info: 'ℹ️ ' };
                toast.textContent = (icons[type] || '') + message;
                container.appendChild(toast);
                setTimeout(() => { if (toast.parentNode) toast.remove(); }, 3400);
            }

            function updateMetaInfo() {
                if (!window.DATA || !window.DATA.models || !window.DATA.models.length) {
                    metaInfoEl.style.display = 'none'; return;
                }
                metaInfoEl.style.display = '';
                const rankingDate = window.DATA.ranking_date;
                if (rankingDate) {
                    const date = new Date(rankingDate);
                    rankingDateTextEl.textContent = `${t.rankingDateLabel} ${date.toLocaleDateString(lang === 'fr' ? 'fr-FR' : 'en-US', { year: 'numeric', month: 'long', day: 'numeric' })}`;
                } else {
                    rankingDateTextEl.textContent = `${t.rankingDateLabel} —`;
                }
                const retrievedAt = window.DATA.retrieved_at;
                if (retrievedAt) {
                    const diffMin = Math.floor((Date.now() - new Date(retrievedAt).getTime()) / 60000);
                    let timeStr = diffMin < 1 ? t.lessThanMinute : diffMin < 60 ? `${diffMin} min` : `${Math.floor(diffMin / 60)} h`;
                    verifiedTextEl.textContent = `${t.verifiedLabel} ${timeStr}`;
                } else {
                    verifiedTextEl.textContent = `${t.verifiedLabel} —`;
                }
                modelsCountTextEl.textContent = t.modelsCount
                    .replace('{filtered}', getFilteredModels().length)
                    .replace('{total}', window.DATA.models.length);
            }

            function startAutoRefreshMeta() {
                if (updateInfoInterval) clearInterval(updateInfoInterval);
                updateInfoInterval = setInterval(updateMetaInfo, 60000);
            }

            function getAllScores() {
                if (!window.DATA || !window.DATA.models) return { general: [], code: [] };
                const models = window.DATA.models;
                return {
                    general: models.map(m => m.score_general),
                    code: models.map(m => m.score_code).filter(s => s !== null)
                };
            }

            function normalize(score, category) {
                const scores = getAllScores()[category];
                if (!scores || scores.length === 0) return 0;
                const min = Math.min(...scores), max = Math.max(...scores);
                if (max === min) return 100;
                return ((score - min) / (max - min)) * 100;
            }

            function getFilteredModels() {
                if (!window.DATA || !window.DATA.models) return [];
                let filtered = [...window.DATA.models];
                if (currentType !== 'all') filtered = filtered.filter(m => m.type === currentType);
                const key = currentCategory === 'general' ? 'score_general' : 'score_code';
                filtered = filtered.filter(m => m[key] != null);
                filtered.sort((a, b) => b[key] - a[key]);
                return filtered;
            }

            function badgeHtml(type) {
                if (type === 'paid') return `<span class="badge paid">${t.paid}</span>`;
                if (type === 'free') return `<span class="badge free">${t.free}</span>`;
                return `<span class="badge">${type}</span>`;
            }

            function apiBadgeHtml(apiAccess) {
                if (apiAccess === 'free') return `<span class="badge api-free">${t.apiFree}</span>`;
                if (apiAccess === 'freemium') return `<span class="badge api-freemium">${t.apiFreemium}</span>`;
                return '';
            }

            // ---- Podium (sans cerveau, hauteurs proportionnelles) ----
            function podiumCardHtml(model, rank, category) {
                const scoreVal = category === 'general' ? model.score_general : model.score_code;
                const pct = Math.round(normalize(scoreVal, category));
                return `
                    <a href="${model.url}" target="_blank" rel="noopener" class="podium-card rank-${rank}">
                        <div class="rank-number">${rank}</div>
                        ${badgeHtml(model.type)}
                        ${apiBadgeHtml(model.api_access)}
                        <div class="name-wrapper"><span class="name">${model.name}</span></div>
                        <div class="vendor">${model.vendor}</div>
                        <div class="score-val">${pct}%</div>
                        <div class="gauge"><div class="gauge-fill" style="width:${pct}%"></div></div>
                    </a>`;
            }

            function adjustPodiumHeights() {
                const cards = podiumEl.querySelectorAll('.podium-card');
                if (!cards.length) return;
                cards.forEach(c => c.style.height = 'auto');
                void podiumEl.offsetHeight;
                const heights = Array.from(cards).map(c => c.getBoundingClientRect().height);
                const maxH = Math.max(...heights);
                const scale2 = 1.15;
                const scale1 = 1.30;
                cards.forEach(c => {
                    if (c.classList.contains('rank-3')) c.style.height = `${maxH}px`;
                    else if (c.classList.contains('rank-2')) c.style.height = `${Math.round(maxH * scale2)}px`;
                    else if (c.classList.contains('rank-1')) c.style.height = `${Math.round(maxH * scale1)}px`;
                });
            }

            function updatePodiumColorClass() {
                podiumEl.classList.remove('category-general', 'category-code');
                podiumEl.classList.add(`category-${currentCategory}`);
            }

            // ---- Gestion de l'expansion des noms ----
            function setupExpandableNames() {
                document.querySelectorAll('.model-name').forEach(container => {
                    if (container.dataset.expandInitialized === 'true') return;
                    container.dataset.expandInitialized = 'true';
                    const textSpan = container.querySelector('.model-name-text');
                    if (!textSpan) return;

                    const wrapper = document.createElement('span');
                    wrapper.className = 'text-toggle-wrapper';
                    textSpan.parentNode.insertBefore(wrapper, textSpan);
                    wrapper.appendChild(textSpan);

                    const btn = document.createElement('button');
                    btn.className = 'expand-toggle';
                    btn.type = 'button';
                    btn.textContent = '\u{1F853}\uFE0E'; // 🡓️
                    btn.setAttribute('aria-label', 'Afficher le nom complet');
                    wrapper.appendChild(btn);

                    btn.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        const item = this.closest('.model-item');
                        if (!item) return;
                        const expanded = item.classList.toggle('expanded');
                        btn.textContent = expanded ? '\u{1F851}\uFE0E' : '\u{1F853}\uFE0E';
                        btn.setAttribute('aria-label', expanded ? 'Réduire' : 'Afficher le nom complet');
                    });

                    container._textSpan = textSpan;
                    container._toggleBtn = btn;
                });
            }

            function updateToggleVisibility() {
                document.querySelectorAll('.model-name').forEach(container => {
                    const textSpan = container._textSpan;
                    const btn = container._toggleBtn;
                    if (!textSpan || !btn) return;
                    const item = container.closest('.model-item');
                    if (item && item.classList.contains('expanded')) {
                        btn.style.display = 'inline';
                        return;
                    }
                    const isOverflowing = textSpan.scrollWidth > textSpan.clientWidth;
                    btn.style.display = isOverflowing ? 'inline' : 'none';
                });
            }

            // ---- Rendu principal ----
            function render() {
                if (!window.DATA || !window.DATA.models) {
                    podiumEl.innerHTML = '';
                    listEl.innerHTML = '';
                    metaInfoEl.style.display = 'none';
                    apiBadgeInfo.style.display = 'none';
                    filtersContainer.style.display = 'none';
                    shareContainer.style.display = 'none';
                    maintenanceMsgEl.style.display = 'block';
                    emptyMsgEl.style.display = 'none';
                    return;
                }
                apiBadgeInfo.style.display = '';
                filtersContainer.style.display = '';
                shareContainer.style.display = '';
                maintenanceMsgEl.style.display = 'none';

                const filtered = getFilteredModels();
                updateMetaInfo();
                if (filtered.length === 0) {
                    podiumEl.innerHTML = '';
                    listEl.innerHTML = '';
                    emptyMsgEl.style.display = 'block';
                    maintenanceMsgEl.style.display = 'none';
                    return;
                }
                emptyMsgEl.style.display = 'none';
                podiumEl.innerHTML = filtered.slice(0, 3).map((m, i) => podiumCardHtml(m, i+1, currentCategory)).join('');
                listEl.innerHTML = filtered.slice(3).map((m, i) => {
                    const rank = 4 + i;
                    const scoreVal = currentCategory === 'general' ? m.score_general : m.score_code;
                    const pct = Math.round(normalize(scoreVal, currentCategory));
                    const gaugeClass = currentCategory === 'general' ? 'gauge-cyan' : 'gauge-orange';
                    return `
                    <a href="${m.url}" target="_blank" rel="noopener" class="model-item">
                        <div class="model-row-top">
                            <span class="model-rank">${rank}</span>
                            <span class="model-name">
                                <span class="model-name-text">${m.name}</span>
                                ${badgeHtml(m.type)}
                                ${apiBadgeHtml(m.api_access)}
                            </span>
                            <span class="model-vendor">${m.vendor}</span>
                        </div>
                        <div class="model-bottom">
                            <div class="gauge-list"><div class="gauge-list-fill ${gaugeClass}" style="width:${pct}%"></div></div>
                            <div class="score-block">
                                <span class="score-label">Score</span>
                                <span class="score-value">${pct}%</span>
                            </div>
                        </div>
                    </a>`;
                }).join('');

                podiumEl.querySelectorAll('.podium-card').forEach(c => c.classList.add('no-anim'));
                adjustPodiumHeights();
                requestAnimationFrame(() => {
                    podiumEl.querySelectorAll('.podium-card').forEach(c => c.classList.remove('no-anim'));
                });
                updatePodiumColorClass();

                setupExpandableNames();
                updateToggleVisibility();
            }

            // Observer pour réévaluer la troncature
            if (window.ResizeObserver) {
                const observer = new ResizeObserver(() => updateToggleVisibility());
                const observeTexts = () => {
                    document.querySelectorAll('.model-name-text').forEach(el => observer.observe(el));
                };
                const originalRender = render;
                render = function() {
                    originalRender();
                    observeTexts();
                };
            } else {
                window.addEventListener('resize', () => updateToggleVisibility());
            }

            // ---- Filtres et partage ----
            typeBtns.forEach(b => b.addEventListener('click', () => {
                typeBtns.forEach(x => x.classList.remove('active'));
                b.classList.add('active'); currentType = b.dataset.type;
                updateTypeDesc(); render();
            }));
            catBtns.forEach(b => b.addEventListener('click', () => {
                catBtns.forEach(x => x.classList.remove('active'));
                b.classList.add('active'); currentCategory = b.dataset.cat;
                updateCategoryDesc(); render();
            }));

            snapshotBtn.addEventListener('click', async () => { /* ... (inchangé) ... */ });

            function generateStars(count) { /* ... (inchangé) ... */ }
            document.getElementById('starfield').style.setProperty('--stars', generateStars(200));

            async function loadData() { /* ... (inchangé) ... */ }

            loadData().then(data => {
                if (!data) {
                    window.DATA = null;
                } else {
                    window.DATA = data;
                }
                render();
                if (window.DATA) startAutoRefreshMeta();
            });
        })();
    </script>
</body>
</html>
