<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Best AI Today — Real-time AI Leaderboard">
    <meta property="og:description" content="Découvrez en temps réel les meilleurs modèles d'IA classés par score Elo. Filtrez par compétence et partagez le podium.">
    <meta property="og:url" content="https://bestai-today.com">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://bestai-today.com/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://bestai-today.com">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #040c18;
            --cyan: #00d4ff;
            --text-light: #cce8f0;
            --paid: #ff66b2;
            --free: #00e676;
            --orange: #ff8c00;
            --card-bg: rgba(6, 18, 36, 0.75);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #040c18;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem 1rem 5rem;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, #0a1a3a 0%, #040c18 70%);
            pointer-events: none; z-index: 0;
        }
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            background:
                linear-gradient(90deg, transparent 0%, transparent calc(50% - 1px), rgba(0,212,255,0.08) calc(50% - 1px), rgba(0,212,255,0.08) calc(50% + 1px), transparent calc(50% + 1px)),
                linear-gradient(0deg, transparent 0%, transparent calc(50% - 1px), rgba(0,212,255,0.08) calc(50% - 1px), rgba(0,212,255,0.08) calc(50% + 1px), transparent calc(50% + 1px));
            background-size: 80px 80px;
            mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
        }
        .starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; --stars: none; }
        .starfield::before { content: ""; display: block; width: 1px; height: 1px; border-radius: 50%; box-shadow: var(--stars); }
        .container { position: relative; z-index: 1; width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 1.5rem; }
        .header { text-align: center; margin-top: 1.5rem; }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.4rem, 8vw, 4rem);
            font-weight: 900; letter-spacing: 0.15em; color: #fff;
            text-shadow: 0 0 20px var(--cyan), 0 0 40px var(--cyan), 0 0 80px rgba(0,212,255,0.4);
            margin-bottom: 0.3rem;
        }
        .header .sub {
            font-family: 'Roboto', sans-serif; font-weight: 700; font-size: 1.4rem;
            color: var(--cyan); letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.95; margin-bottom: 0.5rem;
        }

        /* ---- Bandeau méta ---- */
        .meta-info {
            background: var(--card-bg);
            border: 1px solid rgba(0,212,255,0.15);
            border-radius: 14px;
            padding: 0.6rem 1.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            backdrop-filter: blur(8px);
            color: var(--text-light);
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            margin-bottom: -0.5rem;
        }
        .meta-details { display: flex; flex-wrap: wrap; justify-content: center; align-items: baseline; gap: 0.6rem 1.2rem; font-size: 0.9rem; }
        .meta-details .meta-item { display: flex; align-items: center; gap: 0.35rem; white-space: nowrap; }
        .meta-details .separator { color: var(--cyan); font-weight: 300; }
        .meta-score-explanation { text-align: center; font-size: 0.75rem; color: rgba(204,232,240,0.6); font-weight: 400; line-height: 1.3; }
        .meta-score-sep { color: rgba(204,232,240,0.6); }

        /* ---- Bandeau API ---- */
        .api-badge-info {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid rgba(0,212,255,0.15);
            border-radius: 14px;
            padding: 0.5rem 1rem;
            backdrop-filter: blur(8px);
            font-size: 0.8rem;
            color: rgba(204,232,240,0.7);
            text-align: center;
            margin-top: -0.5rem;
            margin-bottom: -0.5rem;
        }
        .api-badge-info strong { color: var(--cyan); font-weight: 600; }

        /* ---- Filtres ---- */
        .filters { display: flex; flex-wrap: wrap; justify-content: center; gap: 1.5rem; width: 100%; }
        .filter-column { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
        .filter-group { display: flex; gap: 0.5rem; background: rgba(0,212,255,0.08); border-radius: 12px; padding: 0.3rem; backdrop-filter: blur(5px); }
        .filter-btn {
            background: transparent; border: none; color: var(--text-light);
            font-family: 'Roboto', sans-serif; font-weight: 700; font-size: 0.9rem;
            padding: 0.5rem 1.2rem; border-radius: 10px; cursor: pointer;
            transition: all 0.25s ease; letter-spacing: 0.05em; white-space: nowrap;
            display: flex; align-items: center; gap: 0.4rem;
        }
        .filter-btn:hover { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); box-shadow: 0 0 12px rgba(0,212,255,0.4); }
        .filter-btn.active { background: var(--cyan); color: #040c18; text-shadow: none; box-shadow: 0 0 20px var(--cyan); font-weight: 800; }

        .filter-description {
            font-size: 0.75rem;
            color: var(--cyan);
            text-align: center;
            line-height: 1.3;
            word-wrap: break-word;
            overflow-wrap: break-word;
            font-weight: 700;
            text-shadow: 0 0 8px var(--cyan);
        }

        .podium-container {
            display: flex; justify-content: center; align-items: flex-end; gap: 0.8rem;
            margin: 1.5rem 0 0.5rem; flex-wrap: wrap; --podium-color: var(--cyan);
        }
        .podium-container.category-code { --podium-color: var(--orange); }
        .podium-container.category-general { --podium-color: var(--cyan); }
        .podium-card {
            background: var(--card-bg); border: 1px solid var(--podium-color); border-radius: 20px;
            padding: 1.2rem 1rem; text-decoration: none; color: inherit;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            backdrop-filter: blur(8px); box-shadow: 0 0 25px var(--podium-color);
            position: relative; opacity: 0;
            animation: fadeInUp 0.6s cubic-bezier(0.25,0.8,0.25,1) forwards;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            width: 220px;
        }
        .podium-card.no-anim { animation: none !important; opacity: 1 !important; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .podium-card:hover { transform: translateY(-5px); border-color: #fff; box-shadow: 0 0 35px var(--podium-color), 0 0 60px var(--podium-color); }
        .rank-number { font-family: 'Roboto', sans-serif; font-weight: 900; font-size: 4.5rem; line-height: 1; margin-bottom: -0.2rem; color: var(--podium-color); text-shadow: 0 0 20px var(--podium-color); }

        .badge {
            font-size: 0.65rem;
            font-weight: 800;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-top: 0.2rem;
            margin-bottom: 0.5rem;
            white-space: nowrap;
        }
        .badge.paid { background: var(--paid); color: #040c18; }
        .badge.free { background: var(--free); color: #040c18; }
        .badge.api-free {
            background: #4ade80; color: #040c18;
            text-decoration: none;
            cursor: pointer;
            position: relative;
            z-index: 3;
        }
        .badge.api-free:hover {
            background: #22c55e;
        }

        /* Tooltip personnalisé */
        .badge.api-free::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(6, 18, 36, 0.9);
            color: var(--cyan);
            font-size: 0.65rem;
            font-weight: 500;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
            border: 1px solid rgba(0,212,255,0.15);
            backdrop-filter: blur(4px);
        }
        .badge.api-free:hover::after {
            opacity: 1;
        }

        .name-wrapper { width: 100%; display: flex; align-items: flex-end; justify-content: center; overflow: hidden; }
        .name { font-weight: 700; font-size: 1.1rem; text-align: center; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; word-break: break-word; line-height: 1.3; }
        .podium-card .vendor { font-size: 0.8rem; opacity: 0.8; margin: 0.2rem 0 0.5rem; font-weight: 500; }
        .podium-card .score-val { font-family: 'Roboto', sans-serif; font-weight: 700; font-size: 2.2rem; margin: 0.3rem 0; line-height: 1; color: var(--podium-color); }
        .gauge { width: 100%; height: 12px; background: rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden; margin-top: 0.3rem; }
        .gauge-fill { height: 100%; border-radius: 10px; background: var(--podium-color); box-shadow: 0 0 10px var(--podium-color); transition: width 0.5s cubic-bezier(0.25,0.8,0.25,1.2); width: 0%; }
        .status-message { display: none; text-align: center; font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--cyan); text-shadow: 0 0 15px var(--cyan); margin: 2rem 0; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; text-shadow: 0 0 25px var(--cyan); } }
        .model-list { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 1.5rem; }

        /* ---- Bloc modèle (liste) ---- */
        .model-item {
            background: var(--card-bg);
            border: 1px solid rgba(0,212,255,0.15);
            border-radius: 16px;
            padding: 0.5rem 0.8rem;
            display: flex;
            flex-direction: column;
            color: inherit;
            transition: all 0.25s ease;
            backdrop-filter: blur(8px);
            gap: 0.25rem;
            position: relative;
            cursor: pointer;
        }
        .model-item:hover {
            border-color: var(--cyan);
            box-shadow: 0 0 22px rgba(0,212,255,0.4);
            transform: scale(1.01);
        }

        .model-row-top {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            gap: 0.4rem;
            font-size: 0.85rem;
            position: relative;
            z-index: 2;
        }
        .model-rank {
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: var(--cyan);
            min-width: 1.5rem;
            text-align: center;
            flex-shrink: 0;
        }
        .model-name {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            flex: 1 1 auto;
            min-width: 0;
        }
        .model-name-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 700;
            font-size: 0.9rem;
            line-height: 1.4;
            min-width: 0;
        }
        .model-vendor {
            font-size: 0.75rem;
            opacity: 0.6;
            font-weight: 500;
            flex-shrink: 0;
            margin-left: auto;
        }
        .model-bottom {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
            z-index: 2;
        }
        .gauge-list {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            overflow: hidden;
        }
        .gauge-list-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        .gauge-list-fill.gauge-cyan { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
        .gauge-list-fill.gauge-orange { background: var(--orange); box-shadow: 0 0 8px var(--orange); }
        .score-block { display: flex; align-items: center; gap: 0.3rem; white-space: nowrap; font-size: 0.85rem; }
        .score-label { font-size: 0.75rem; font-weight: 500; color: rgba(204,232,240,0.55); text-transform: uppercase; letter-spacing: 0.03em; }
        .score-value { color: var(--text-light); font-weight: 700; }

        /* ---- Bouton flèche expansion ---- */
        .expand-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--cyan) !important;  /* priorité maximale */
            font-size: 0.8rem;
            font-weight: 700;
            line-height: 1;
            cursor: pointer;
            text-shadow: 0 0 8px var(--cyan);
            padding: 0 0.1rem;
            transition: text-shadow 0.2s, color 0.2s;
            flex-shrink: 0;
            font-family: 'Segoe UI Symbol', 'Arial Unicode MS', 'Roboto', sans-serif;
            position: relative;
            z-index: 3;
        }
        .expand-toggle:hover { text-shadow: 0 0 14px var(--cyan); color: #ffffff !important; }

        .text-toggle-wrapper { display: contents; }

        /* État expansé */
        .model-item.expanded .model-name {
            flex-wrap: wrap;
            align-items: flex-start;
            align-self: flex-start;
        }
        .model-item.expanded .text-toggle-wrapper {
            display: block;
            width: 100%;
        }
        .model-item.expanded .model-name-text {
            white-space: normal;
            overflow: visible;
            text-overflow: clip;
            display: inline;
        }
        .model-item.expanded .expand-toggle {
            display: inline;
            margin-left: 0.15rem;
        }

        .share-container { display: flex; justify-content: center; margin: 1rem 0; }
        .share-container .filter-btn { gap: 0.4rem; }
        .ad-slot { min-height: 90px; width: 100%; max-width: 728px; margin: 0 auto; }
        .footer { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid rgba(0,212,255,0.15); text-align: center; font-size: 0.75rem; opacity: 0.55; display: flex; flex-direction: column; gap: 0.5rem; }
        .footer a { color: var(--cyan); text-decoration: none; opacity: 0.8; transition: opacity 0.2s; }
        .footer a:hover { opacity: 1; text-decoration: underline; }
        .sticky-footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(6,18,36,0.9); backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,212,255,0.15); text-align: center;
            padding: 0.5rem 1rem; z-index: 100;
            display: flex; justify-content: center; align-items: center; gap: 1.5rem;
            font-size: 0.85rem; color: var(--text-light);
        }
        .sticky-footer a { color: var(--cyan); text-decoration: none; font-weight: 500; transition: opacity 0.2s; }
        .sticky-footer a:hover { opacity: 0.8; text-decoration: underline; }
        @media (max-width: 650px) {
            .filters { flex-direction: column; align-items: center; }
            .meta-info { padding: 0.5rem 1rem; gap: 0.2rem; }
            .meta-details { flex-direction: column; align-items: center; gap: 0.15rem; }
            .meta-details .separator { display: none; }
            .meta-score-explanation { font-size: 0.7rem; }
            .meta-score-explanation span { display: block; }
            .meta-score-sep { display: none !important; }
            #scorePart1, #scorePart2 { display: block; }
            .podium-container { flex-direction: column; align-items: center; gap: 1rem; }
            .podium-card { width: 85% !important; max-width: 320px; }
            .sticky-footer { flex-direction: column; gap: 0.3rem; font-size: 0.8rem; }
        }
        .toast-container { position: fixed; bottom: 4rem; right: 2rem; z-index: 9999; display: flex; flex-direction: column-reverse; gap: 0.8rem; pointer-events: none; }
        .toast {
            background: rgba(6,18,36,0.9); backdrop-filter: blur(12px); border: 1px solid var(--cyan);
            border-radius: 14px; padding: 0.8rem 1.4rem; font-family: 'Roboto', sans-serif; font-weight: 500;
            font-size: 0.95rem; color: var(--text-light); box-shadow: 0 0 20px rgba(0,212,255,0.3);
            display: flex; align-items: center; gap: 0.6rem; max-width: 380px; pointer-events: auto;
            animation: toastIn 0.4s cubic-bezier(0.16,1,0.3,1) forwards, toastOut 0.3s 3s forwards;
            opacity: 0; transform: translateY(20px);
        }
        .toast.success { border-color: #00e676; box-shadow: 0 0 20px rgba(0,230,118,0.4); color: #ccffe6; }
        .toast.error { border-color: #ff5252; box-shadow: 0 0 20px rgba(255,82,82,0.4); color: #ffcccc; }
        .toast.info { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,212,255,0.4); color: #cce8f0; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-10px); } }
    </style>
</head>
<body>
    <div class="starfield" id="starfield"></div>
    <div class="container">
        <header class="header">
            <h1>BEST AI TODAY</h1>
            <div class="sub" id="subtitle"></div>
        </header>

        <!-- Bandeau méta (masqué en maintenance) -->
        <div id="metaInfo" class="meta-info" style="display: none;">
            <div class="meta-details">
                <span class="meta-item">📅 <span id="rankingDateText"></span></span>
                <span class="separator">•</span>
                <span class="meta-item">✅ <span id="verifiedText"></span></span>
                <span class="separator">•</span>
                <span class="meta-item" id="modelsCountText"></span>
            </div>
            <div class="meta-score-explanation">
                <span id="scorePart1"></span><span class="meta-score-sep"> — </span><span id="scorePart2"></span>
            </div>
        </div>

        <!-- Bandeau API (masqué en maintenance) -->
        <div class="api-badge-info" id="apiBadgeInfo"></div>

        <!-- Filtres (masqués en maintenance) -->
        <div class="filters" id="filtersContainer">
            <div class="filter-column">
                <div class="filter-group" id="typeFilter">
                    <button class="filter-btn active" data-type="all" id="filterAll"></button>
                    <button class="filter-btn" data-type="free" id="filterFree"></button>
                    <button class="filter-btn" data-type="paid" id="filterPaid"></button>
                </div>
                <div class="filter-description" id="typeDesc"></div>
            </div>
            <div class="filter-column">
                <div class="filter-group" id="categoryFilter">
                    <button class="filter-btn active" data-cat="general" id="filterGeneral"></button>
                    <button class="filter-btn" data-cat="code" id="filterCode"></button>
                </div>
                <div class="filter-description" id="categoryDesc"></div>
            </div>
        </div>

        <div id="podium" class="podium-container category-general"></div>
        <div id="emptyMsg" class="status-message"></div>
        <div id="maintenanceMsg" class="status-message"></div>
        <div class="share-container" id="shareContainer">
            <button id="snapshotBtn" class="filter-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                </svg>
                <span id="shareText"></span>
            </button>
        </div>
        <div id="modelList" class="model-list"></div>
        <div class="ad-slot" aria-hidden="true"></div>
        <footer class="footer">
            <div id="footerSource"></div>
            <div id="footerAffiliate"></div>
            <div id="footerDisclaimer"></div>
            <div id="footerLegal"></div>
        </footer>
    </div>
    <div id="stickyFooter" class="sticky-footer">
        <a href="https://www.buymeacoffee.com/bestaitoday" target="_blank" rel="noopener" id="stickySupportLink"></a>
        <span id="stickyCopyright"></span>
    </div>
    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

    <script>
        (function() {
            const i18n = {
                fr: {
                    slogan: 'Comparateur en temps réel – Scores, classements, API gratuites',
                    all: 'Tous', free: 'Gratuit', paid: 'Payant',
                    general: 'Général', code: 'Code',
                    share: 'Partager',
                    maintenance: '🛠️ En cours de maintenance',
                    empty: 'Aucun modèle trouvé pour cette sélection.',
                    snapshotCopied: '✅ Image copiée dans le presse-papiers !',
                    snapshotError: 'Impossible de partager automatiquement.',
                    html2canvasMissing: 'html2canvas non chargé.',
                    snapshotDownloaded: 'Image téléchargée.',
                    rankingDateLabel: 'Classement du',
                    verifiedLabel: 'Vérifié il y a',
                    lessThanMinute: "moins d'une minute",
                    modelsCount: '{filtered} / {total} modèles affichés',
                    scorePart1: 'Score basé sur les duels Chatbot Arena',
                    scorePart2: '100% = meilleur modèle du moment',
                    typeAllDesc: "Tous les modèles, sans distinction d'accès.",
                    typeFreeDesc: 'Accessibles sans abonnement via leur interface web.',
                    typePaidDesc: 'Nécessitent un abonnement ou des crédits.',
                    categoryGeneralDesc: 'Performances en conversation générale.',
                    categoryCodeDesc: 'Performances en programmation et raisonnement technique.',
                    apiFree: 'API gratuite',
                    apiBadgeInfoText: '💡 Le badge <strong>« API gratuite »</strong> indique les modèles pour lesquels il existe une API utilisable gratuitement (source : freellm.net).',
                    support: '☕ Soutenir le projet',
                    affiliateNotice: "Certains liens sont des liens d'affiliation.",
                    source: 'Classement basé sur les données Chatbot Arena.',
                    disclaimer: 'Ce classement ne constitue pas un avis éditorial.',
                    legal: 'Mentions légales',
                    copyright: '© 2026 Best AI Today'
                },
                en: {
                    slogan: 'Real-time comparison – Scores, rankings, free APIs',
                    all: 'All', free: 'Free', paid: 'Paid',
                    general: 'General', code: 'Code',
                    share: 'Share',
                    maintenance: '🛠️ Under maintenance',
                    empty: 'No models found for this selection.',
                    snapshotCopied: '✅ Image copied to clipboard!',
                    snapshotError: 'Could not share automatically.',
                    html2canvasMissing: 'html2canvas not loaded.',
                    snapshotDownloaded: 'Image downloaded.',
                    rankingDateLabel: 'Ranking from',
                    verifiedLabel: 'Checked',
                    lessThanMinute: 'less than a minute',
                    modelsCount: '{filtered} / {total} models shown',
                    scorePart1: 'Score based on Chatbot Arena battles',
                    scorePart2: '100% = best model right now',
                    typeAllDesc: 'All models, free and paid.',
                    typeFreeDesc: 'Accessible without a subscription via their web interface.',
                    typePaidDesc: 'Requires a subscription or credits.',
                    categoryGeneralDesc: 'Performance in general conversation.',
                    categoryCodeDesc: 'Performance in programming and technical reasoning.',
                    apiFree: 'Free API',
                    apiBadgeInfoText: '💡 The <strong>"Free API"</strong> badge indicates models for which a free API exists (source: freellm.net).',
                    support: '☕ Support the project',
                    affiliateNotice: 'Some links are affiliate links.',
                    source: 'Rankings based on Chatbot Arena data.',
                    disclaimer: 'This ranking is not editorial advice.',
                    legal: 'Legal notice',
                    copyright: '© 2026 Best AI Today'
                }
            };

            const lang = navigator.language.startsWith('fr') ? 'fr' : 'en';
            document.documentElement.lang = lang;
            const t = i18n[lang];

            // Mise à jour du titre et de la meta description selon la langue
            if (lang === 'fr') {
                document.title = 'Best AI Today – Classement et comparatif des meilleurs modèles d\'IA (GPT, Claude, Gemini)';
                const metaDesc = document.querySelector('meta[name="description"]');
                if (metaDesc) {
                    metaDesc.setAttribute('content', 'Comparez gratuitement les meilleurs modèles d\'IA en temps réel. Classement basé sur Chatbot Arena : GPT-4, Claude, Gemini, Llama, Mistral, DeepSeek. Découvrez pour chaque modèle s\'il existe une API gratuite, et accédez-y directement.');
                }
            } else {
                document.title = 'Best AI Today – Ranking & Comparison of the Best AI Models (GPT, Claude, Gemini)';
                const metaDesc = document.querySelector('meta[name="description"]');
                if (metaDesc) {
                    metaDesc.setAttribute('content', 'Compare the best AI models in real time. Rankings based on Chatbot Arena: GPT-4, Claude, Gemini, Llama, Mistral, DeepSeek. Find out which models offer a free API, and access it directly.');
                }
            }

            document.getElementById('subtitle').textContent = t.slogan;
            document.getElementById('filterAll').textContent = t.all;
            document.getElementById('filterFree').textContent = t.free;
            document.getElementById('filterPaid').textContent = t.paid;
            document.getElementById('filterGeneral').textContent = t.general;
            document.getElementById('filterCode').textContent = t.code;
            document.getElementById('shareText').textContent = t.share;
            document.getElementById('maintenanceMsg').textContent = t.maintenance;
            document.getElementById('emptyMsg').textContent = t.empty;
            document.getElementById('scorePart1').textContent = t.scorePart1;
            document.getElementById('scorePart2').textContent = t.scorePart2;
            document.getElementById('apiBadgeInfo').innerHTML = t.apiBadgeInfoText;
            document.getElementById('footerSource').textContent = t.source;
            document.getElementById('footerAffiliate').textContent = t.affiliateNotice;
            document.getElementById('footerDisclaimer').textContent = t.disclaimer;
            document.getElementById('footerLegal').innerHTML = `<a href="legal.html">${t.legal}</a>`;
            document.getElementById('stickySupportLink').textContent = t.support;
            document.getElementById('stickyCopyright').textContent = t.copyright;

            let currentType = 'all';
            let currentCategory = 'general';
            let updateInfoInterval = null;

            const podiumEl = document.getElementById('podium');
            const listEl = document.getElementById('modelList');
            const emptyMsgEl = document.getElementById('emptyMsg');
            const metaInfoEl = document.getElementById('metaInfo');
            const rankingDateTextEl = document.getElementById('rankingDateText');
            const verifiedTextEl = document.getElementById('verifiedText');
            const modelsCountTextEl = document.getElementById('modelsCountText');
            const typeBtns = document.querySelectorAll('#typeFilter .filter-btn');
            const catBtns = document.querySelectorAll('#categoryFilter .filter-btn');
            const snapshotBtn = document.getElementById('snapshotBtn');
            const typeDescEl = document.getElementById('typeDesc');
            const categoryDescEl = document.getElementById('categoryDesc');
            const filtersContainer = document.getElementById('filtersContainer');
            const apiBadgeInfo = document.getElementById('apiBadgeInfo');
            const shareContainer = document.getElementById('shareContainer');
            const maintenanceMsgEl = document.getElementById('maintenanceMsg');

            const typeDescriptions = { all: t.typeAllDesc, free: t.typeFreeDesc, paid: t.typePaidDesc };
            const categoryDescriptions = { general: t.categoryGeneralDesc, code: t.categoryCodeDesc };

            function updateTypeDesc() {
                const active = document.querySelector('#typeFilter .filter-btn.active');
                typeDescEl.textContent = typeDescriptions[active ? active.dataset.type : 'all'];
                setDescriptionWidths();
            }
            function updateCategoryDesc() {
                const active = document.querySelector('#categoryFilter .filter-btn.active');
                categoryDescEl.textContent = categoryDescriptions[active ? active.dataset.cat : 'general'];
                setDescriptionWidths();
            }
            function setDescriptionWidths() {
                typeDescEl.style.maxWidth = 'none';
                categoryDescEl.style.maxWidth = 'none';
                requestAnimationFrame(() => {
                    typeDescEl.style.maxWidth = (document.getElementById('typeFilter').offsetWidth - 4) + 'px';
                    categoryDescEl.style.maxWidth = (document.getElementById('categoryFilter').offsetWidth - 4) + 'px';
                });
            }
            window.addEventListener('load', setDescriptionWidths);
            window.addEventListener('resize', setDescriptionWidths);
            updateTypeDesc();
            updateCategoryDesc();

            function showToast(message, type = 'info') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                const icons = { success: '✅ ', error: '❌ ', info: 'ℹ️ ' };
                toast.textContent = (icons[type] || '') + message;
                container.appendChild(toast);
                setTimeout(() => { if (toast.parentNode) toast.remove(); }, 3400);
            }

            function updateMetaInfo() {
                if (!window.DATA || !window.DATA.models || !window.DATA.models.length) {
                    metaInfoEl.style.display = 'none'; return;
                }
                metaInfoEl.style.display = '';
                const rankingDate = window.DATA.ranking_date;
                if (rankingDate) {
                    const date = new Date(rankingDate);
                    rankingDateTextEl.textContent = `${t.rankingDateLabel} ${date.toLocaleDateString(lang === 'fr' ? 'fr-FR' : 'en-US', { year: 'numeric', month: 'long', day: 'numeric' })}`;
                } else {
                    rankingDateTextEl.textContent = `${t.rankingDateLabel} —`;
                }
                const retrievedAt = window.DATA.retrieved_at;
                if (retrievedAt) {
                    const diffMin = Math.floor((Date.now() - new Date(retrievedAt).getTime()) / 60000);
                    let timeStr = diffMin < 1 ? t.lessThanMinute : diffMin < 60 ? `${diffMin} min` : `${Math.floor(diffMin / 60)} h`;
                    verifiedTextEl.textContent = `${t.verifiedLabel} ${timeStr}`;
                } else {
                    verifiedTextEl.textContent = `${t.verifiedLabel} —`;
                }
                modelsCountTextEl.textContent = t.modelsCount
                    .replace('{filtered}', getFilteredModels().length)
                    .replace('{total}', window.DATA.models.length);
            }

            function startAutoRefreshMeta() {
                if (updateInfoInterval) clearInterval(updateInfoInterval);
                updateInfoInterval = setInterval(updateMetaInfo, 60000);
            }

            function getAllScores() {
                if (!window.DATA || !window.DATA.models) return { general: [], code: [] };
                const models = window.DATA.models;
                return {
                    general: models.map(m => m.score_general),
                    code: models.map(m => m.score_code).filter(s => s !== null)
                };
            }

            function normalize(score, category) {
                const scores = getAllScores()[category];
                if (!scores || scores.length === 0) return 0;
                const min = Math.min(...scores), max = Math.max(...scores);
                if (max === min) return 100;
                return ((score - min) / (max - min)) * 100;
            }

            function getFilteredModels() {
                if (!window.DATA || !window.DATA.models) return [];
                let filtered = [...window.DATA.models];
                if (currentType !== 'all') filtered = filtered.filter(m => m.type === currentType);
                const key = currentCategory === 'general' ? 'score_general' : 'score_code';
                filtered = filtered.filter(m => m[key] != null);
                filtered.sort((a, b) => b[key] - a[key]);
                return filtered;
            }

            function badgeHtml(type) {
                if (type === 'paid') return `<span class="badge paid">${t.paid}</span>`;
                if (type === 'free') return `<span class="badge free">${t.free}</span>`;
                return `<span class="badge">${type}</span>`;
            }

            // Fonction pour le badge API, avec lien direct d'obtention de clé
            function apiBadgeHtml(hasFreeApi, providers) {
                if (!hasFreeApi || !providers || providers.length === 0) return '';
                const provider = providers[0];
                const url = provider.url && provider.url.trim() !== '' ? provider.url : null;
                const label = t.apiFree;
                const tooltip = provider.provider || '';
                if (url) {
                    return `<a href="${url}" target="_blank" rel="noopener" class="badge api-free" data-tooltip="${tooltip}">${label}</a>`;
                } else {
                    return `<span class="badge api-free" data-tooltip="${tooltip}">${label}</span>`;
                }
            }

            // ---- Podium (inchangé) ----
            function podiumCardHtml(model, rank, category) {
                const scoreVal = category === 'general' ? model.score_general : model.score_code;
                const pct = Math.round(normalize(scoreVal, category));
                const apiBadge = model.has_free_api ? `<span class="badge api-free">${t.apiFree}</span>` : '';
                return `
                    <a href="${model.url}" target="_blank" rel="noopener" class="podium-card rank-${rank}">
                        <div class="rank-number">${rank}</div>
                        ${badgeHtml(model.type)}
                        ${apiBadge}
                        <div class="name-wrapper"><span class="name">${model.name}</span></div>
                        <div class="vendor">${model.vendor}</div>
                        <div class="score-val">${pct}%</div>
                        <div class="gauge"><div class="gauge-fill" style="width:${pct}%"></div></div>
                    </a>`;
            }

            function adjustPodiumHeights() {
                const cards = podiumEl.querySelectorAll('.podium-card');
                if (!cards.length) return;
                cards.forEach(c => c.style.height = 'auto');
                void podiumEl.offsetHeight;
                const heights = Array.from(cards).map(c => c.getBoundingClientRect().height);
                const maxH = Math.max(...heights);
                const scale2 = 1.15;
                const scale1 = 1.30;
                cards.forEach(c => {
                    if (c.classList.contains('rank-3')) c.style.height = `${maxH}px`;
                    else if (c.classList.contains('rank-2')) c.style.height = `${Math.round(maxH * scale2)}px`;
                    else if (c.classList.contains('rank-1')) c.style.height = `${Math.round(maxH * scale1)}px`;
                });
            }

            function updatePodiumColorClass() {
                podiumEl.classList.remove('category-general', 'category-code');
                podiumEl.classList.add(`category-${currentCategory}`);
            }

            // ---- Gestion de l'expansion des noms (symboles universels) ----
            function setupExpandableNames() {
                document.querySelectorAll('.model-name').forEach(container => {
                    if (container.dataset.expandInitialized === 'true') return;
                    container.dataset.expandInitialized = 'true';
                    const textSpan = container.querySelector('.model-name-text');
                    if (!textSpan) return;

                    const wrapper = document.createElement('span');
                    wrapper.className = 'text-toggle-wrapper';
                    textSpan.parentNode.insertBefore(wrapper, textSpan);
                    wrapper.appendChild(textSpan);

                    const btn = document.createElement('button');
                    btn.className = 'expand-toggle';
                    btn.type = 'button';
                    const expandSymbol = '▼';   // triangle vers le bas (présent sur tous les systèmes)
                    const collapseSymbol = '▲'; // triangle vers le haut
                    btn.textContent = expandSymbol;
                    btn.setAttribute('aria-label', 'Afficher le nom complet');
                    wrapper.appendChild(btn);

                    btn.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        const item = this.closest('.model-item');
                        if (!item) return;
                        const expanded = item.classList.toggle('expanded');
                        btn.textContent = expanded ? collapseSymbol : expandSymbol;
                        btn.setAttribute('aria-label', expanded ? 'Réduire' : 'Afficher le nom complet');
                    });

                    container._textSpan = textSpan;
                    container._toggleBtn = btn;
                });
            }

            function updateToggleVisibility() {
                document.querySelectorAll('.model-name').forEach(container => {
                    const textSpan = container._textSpan;
                    const btn = container._toggleBtn;
                    if (!textSpan || !btn) return;
                    const item = container.closest('.model-item');
                    if (item && item.classList.contains('expanded')) {
                        btn.style.display = 'inline';
                        return;
                    }
                    const isOverflowing = textSpan.scrollWidth > textSpan.clientWidth;
                    btn.style.display = isOverflowing ? 'inline' : 'none';
                });
            }

            // ---- Clic sur tout le bloc modèle (délégation) ----
            listEl.addEventListener('click', function(e) {
                if (e.target.closest('.badge.api-free') || e.target.closest('.expand-toggle')) {
                    return;
                }
                const item = e.target.closest('.model-item');
                if (!item) return;
                const url = item.dataset.modelUrl;
                if (url) {
                    window.open(url, '_blank', 'noopener');
                }
            });

            // ---- Rendu principal ----
            function render() {
                if (!window.DATA || !window.DATA.models) {
                    podiumEl.innerHTML = '';
                    listEl.innerHTML = '';
                    metaInfoEl.style.display = 'none';
                    apiBadgeInfo.style.display = 'none';
                    filtersContainer.style.display = 'none';
                    shareContainer.style.display = 'none';
                    maintenanceMsgEl.style.display = 'block';
                    emptyMsgEl.style.display = 'none';
                    return;
                }
                apiBadgeInfo.style.display = '';
                filtersContainer.style.display = '';
                shareContainer.style.display = '';
                maintenanceMsgEl.style.display = 'none';

                const filtered = getFilteredModels();
                updateMetaInfo();
                if (filtered.length === 0) {
                    podiumEl.innerHTML = '';
                    listEl.innerHTML = '';
                    emptyMsgEl.style.display = 'block';
                    maintenanceMsgEl.style.display = 'none';
                    return;
                }
                emptyMsgEl.style.display = 'none';
                podiumEl.innerHTML = filtered.slice(0, 3).map((m, i) => podiumCardHtml(m, i+1, currentCategory)).join('');
                listEl.innerHTML = filtered.slice(3).map((m, i) => {
                    const rank = 4 + i;
                    const scoreVal = currentCategory === 'general' ? m.score_general : m.score_code;
                    const pct = Math.round(normalize(scoreVal, currentCategory));
                    const gaugeClass = currentCategory === 'general' ? 'gauge-cyan' : 'gauge-orange';
                    return `
                    <div class="model-item" data-model-url="${m.url}">
                        <div class="model-row-top">
                            <span class="model-rank">${rank}</span>
                            <span class="model-name">
                                <span class="model-name-text">${m.name}</span>
                                ${badgeHtml(m.type)}
                                ${apiBadgeHtml(m.has_free_api, m.free_api_providers)}
                            </span>
                            <span class="model-vendor">${m.vendor}</span>
                        </div>
                        <div class="model-bottom">
                            <div class="gauge-list"><div class="gauge-list-fill ${gaugeClass}" style="width:${pct}%"></div></div>
                            <div class="score-block">
                                <span class="score-label">Score</span>
                                <span class="score-value">${pct}%</span>
                            </div>
                        </div>
                    </div>`;
                }).join('');

                podiumEl.querySelectorAll('.podium-card').forEach(c => c.classList.add('no-anim'));
                adjustPodiumHeights();
                requestAnimationFrame(() => {
                    podiumEl.querySelectorAll('.podium-card').forEach(c => c.classList.remove('no-anim'));
                });
                updatePodiumColorClass();

                setupExpandableNames();
                updateToggleVisibility();
            }

            // Observer pour réévaluer la troncature
            if (window.ResizeObserver) {
                const observer = new ResizeObserver(() => updateToggleVisibility());
                const observeTexts = () => {
                    document.querySelectorAll('.model-name-text').forEach(el => observer.observe(el));
                };
                const originalRender = render;
                render = function() {
                    originalRender();
                    observeTexts();
                };
            } else {
                window.addEventListener('resize', () => updateToggleVisibility());
            }

            // ---- Filtres et partage ----
            typeBtns.forEach(b => b.addEventListener('click', () => {
                typeBtns.forEach(x => x.classList.remove('active'));
                b.classList.add('active'); currentType = b.dataset.type;
                updateTypeDesc(); render();
            }));
            catBtns.forEach(b => b.addEventListener('click', () => {
                catBtns.forEach(x => x.classList.remove('active'));
                b.classList.add('active'); currentCategory = b.dataset.cat;
                updateCategoryDesc(); render();
            }));

            snapshotBtn.addEventListener('click', async () => {
                if (typeof html2canvas === 'undefined') { showToast(t.html2canvasMissing, 'error'); return; }
                try {
                    const captureDiv = document.createElement('div');
                    captureDiv.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:800px;background:#040c18;padding:2rem 1.5rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:1.2rem;font-family:Roboto,sans-serif;color:#cce8f0;';
                    const title = document.createElement('div');
                    title.style.cssText = "font-family:'Orbitron',sans-serif;font-size:2.8rem;font-weight:900;letter-spacing:0.15em;color:#fff;text-shadow:0 0 20px #00d4ff,0 0 40px #00d4ff;text-align:center;";
                    title.textContent = 'BEST AI TODAY';
                    const meta = document.createElement('div');
                    meta.style.cssText = 'background:rgba(6,18,36,0.75);border:1px solid rgba(0,212,255,0.15);border-radius:14px;padding:0.6rem 1.8rem;font-size:0.9rem;text-align:center;';
                    meta.innerHTML = `<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:0.6rem 1.2rem;"><span>📅 ${rankingDateTextEl.textContent}</span><span style="color:#00d4ff;font-weight:300;">•</span><span>✅ ${verifiedTextEl.textContent}</span><span style="color:#00d4ff;font-weight:300;">•</span><span>${modelsCountTextEl.textContent}</span></div><div style="font-size:0.75rem;opacity:0.6;">${t.scorePart1} — ${t.scorePart2}</div>`;
                    const podiumClone = podiumEl.cloneNode(true);
                    podiumClone.querySelectorAll('.podium-card.no-anim').forEach(c => c.classList.remove('no-anim'));
                    podiumClone.style.margin = '0';
                    const watermark = document.createElement('div');
                    watermark.style.cssText = 'font-family:monospace;font-size:0.85rem;color:#00d4ff;opacity:0.8;text-align:center;';
                    watermark.textContent = 'www.bestai-today.com';
                    captureDiv.appendChild(title); captureDiv.appendChild(meta); captureDiv.appendChild(podiumClone); captureDiv.appendChild(watermark);
                    document.body.appendChild(captureDiv);

                    const canvas = await html2canvas(captureDiv, { backgroundColor: '#040c18', scale: 2, useCORS: true, allowTaint: false, logging: false });
                    document.body.removeChild(captureDiv);

                    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
                    if (!blob) throw new Error('Blob null');
                    const file = new File([blob], 'bestai-today.png', { type: 'image/png' });

                    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                        try { await navigator.share({ files: [file], title: 'Best AI Today', url: 'https://bestai-today.com' }); return; }
                        catch (e) { if (e.name === 'AbortError') return; }
                    }
                    if (navigator.clipboard && navigator.clipboard.write && typeof ClipboardItem !== 'undefined') {
                        try { await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]); showToast(t.snapshotCopied, 'success'); return; }
                        catch (e) {}
                    }
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = 'bestai-today.png';
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    showToast(t.snapshotDownloaded, 'info');
                } catch (err) {
                    console.error('Snapshot error:', err);
                    showToast(t.snapshotError, 'error');
                }
            });

            function generateStars(count) {
                let s = [];
                for (let i = 0; i < count; i++) {
                    const x = Math.random() * 100, y = Math.random() * 100;
                    const size = Math.random() * 1.2 + 0.3, opacity = Math.random() * 0.4 + 0.2;
                    s.push(`${x}vw ${y}vh ${size}px ${size}px rgba(0,212,255,${opacity})`);
                }
                return s.join(', ');
            }
            document.getElementById('starfield').style.setProperty('--stars', generateStars(200));

            async function loadData() {
                try {
                    const resp = await fetch('data.json?v=' + Date.now());
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    const data = await resp.json();
                    if (!data || !Array.isArray(data.models) || data.models.length === 0) throw new Error('Invalid data structure');
                    return data;
                } catch (e) { return null; }
            }

            loadData().then(data => {
                if (!data) {
                    window.DATA = null;
                } else {
                    window.DATA = data;
                }
                render();
                if (window.DATA) startAutoRefreshMeta();
            });
        })();
    </script>
</body>
</html>
